# Nomie Travel Agent Configuration
# Based on DeerFlow config.example.yaml, trimmed for travel planning use case.

# ============================================================================
# Models Configuration
# ============================================================================

models:
  # Default model (Lead Agent + flight-search + hotel-search)
  - name: claude-sonnet
    display_name: Claude Sonnet 4
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-20250514
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 4096
    temperature: 0.7

  # For itinerary-planner (high TPM limit, cheap)
  - name: gpt-4o-mini
    display_name: GPT-4o Mini
    use: langchain_openai:ChatOpenAI
    model: gpt-4o-mini
    api_key: $OPENAI_API_KEY
    max_tokens: 4096
    temperature: 0.7

  # For travel-tips (third provider, avoids rate limit collision)
  - name: gemini
    display_name: Gemini 2.0 Flash
    use: langchain_google_genai:ChatGoogleGenerativeAI
    model: gemini-2.5-flash
    api_key: $GOOGLE_API_KEY
    max_tokens: 4096
    temperature: 0.7

# ============================================================================
# Tool Groups Configuration
# ============================================================================

tool_groups:
  - name: web

# ============================================================================
# Tools Configuration
# ============================================================================

tools:
  # Web search tool (requires Tavily API key)
  - name: web_search
    group: web
    use: src.community.tavily.tools:web_search_tool
    max_results: 5

  # Web fetch tool (uses Jina AI reader)
  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

# ============================================================================
# Sandbox Configuration
# ============================================================================

sandbox:
  use: src.sandbox.local:LocalSandboxProvider

# ============================================================================
# Subagents Configuration
# ============================================================================

subagents:
  timeout_seconds: 600
  agents:
    flight-search:
      timeout_seconds: 600
    hotel-search:
      timeout_seconds: 600
    itinerary-planner:
      timeout_seconds: 600
    travel-tips:
      timeout_seconds: 600

# ============================================================================
# Skills Configuration
# ============================================================================

skills:
  container_path: /mnt/skills

# ============================================================================
# Title Generation
# ============================================================================

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization
# ============================================================================

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null

# ============================================================================
# Memory
# ============================================================================

memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Checkpointer
# ============================================================================

checkpointer:
  type: sqlite
  connection_string: checkpoints.db
